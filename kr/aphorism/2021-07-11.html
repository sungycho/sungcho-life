<h3>행복에 대한 단상</h3>
<p class="byline">2021년 7월 11일</p>

<p style="font-size: 0.85em; margin-top: -0.5em; margin-bottom: 2em;">
  <a href="/aphorism/2021-07-11.html">English</a>
  
</p>

<p>행복</p>
<p>내가 행복한 삶이 뭔지 정의할 순 없음</p>
<p>하지만 불행한 삶이 무엇인지에 대해 생각해볼 수 있음
(안나 카레리나)</p>
<p>—&gt; 세상에 내가 기여하지 못한다고 생각하는 삶</p>
<p>그러므로 난 내가 세상에 꼭 필요한 가치를 창출한다고 생각될 때 삶을 유지할 것임</p>
