<h3>기획과 계획의 차이</h3>
<p class="byline">2021년 6월 29일</p>

<p style="font-size: 0.85em; margin-top: -0.5em; margin-bottom: 2em;">
  <a href="/aphorism/2021-06-29.html">English</a>
  
</p>

<p>기획은 What과 Why를 정의하는 것, 계획은 How를 정의하는 것</p>
<p>문제 해결의 최초 단계는 문제를 정의하는 것!</p>
<p>문제는 ‘바람직한 상태와 현상 간의 차이(gap)’</p>
<p>문제점은 문제를 일으키고 있는 원인 중 대책을 수립할 수 있는 것</p>
